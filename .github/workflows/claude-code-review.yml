# managed-by: github-policies
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Skip fork PRs: they run without the base repo's secrets/OIDC, so the
    # reviewer can't authenticate and the job fails. Review external
    # contributions on demand by commenting `@claude` (see claude.yml).
    if: >-
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # ANTHROPIC_BASE_URL must be job-level: a `uses:` step's env block does not
    # reach the composite action's `${{ env.* }}` context, so a step-level value
    # never reaches the Claude SDK and the endpoint is silently ignored.
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          additional_permissions: |
            actions: read
          claude_args: '--model claude-opus-4-8'
          prompt: |
            /review-pr PR NUMBER: ${{ github.event.pull_request.number }} in REPO: ${{ github.repository }}
